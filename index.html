<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人网站导航</title>
    
    <link rel="dns-prefetch" href="https://favicon.im">
    <link rel="preconnect" href="https://favicon.im" crossorigin>
    <link rel="dns-prefetch" href="https://icons.duckduckgo.com">
    <link rel="preconnect" href="https://icons.duckduckgo.com" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" as="style">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#111111">
    <link rel="apple-touch-icon" href="https://icons.duckduckgo.com/ip3/github.com.ico">
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --glass: rgba(20, 20, 20, 0.6);
            --glass-hover: rgba(40, 40, 40, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #bbb;
            --primary: #3498db;
            --radius: 15px;
            --card-w: 160px; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        
        /* 背景平滑淡入效果 */
        body { 
            background-color: #111; 
            background-repeat: no-repeat; 
            background-position: center center; 
            background-attachment: fixed; 
            background-size: cover; 
            min-height: 100vh; 
            color: var(--text); 
            overflow-x: hidden; 
            transition: background-image 0.8s ease-in-out; 
        }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(12px); z-index: -1; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 15px 100px; text-align: center; }
        .tab-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 35px; flex-wrap: wrap; }
        .tabs { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { padding: 8px 18px; border-radius: 40px; border: 1px solid var(--glass-border); background: var(--glass); color: var(--text-dim); cursor: pointer; transition: 0.3s; font-size: 13px; }
        .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .tab-btn.hidden-item { opacity: 0.4; text-decoration: line-through; border-style: dashed; } 
        .manage-cat-btn { background: none; border: 1px dashed var(--glass-border); color: var(--text-dim); padding: 8px 15px; border-radius: 40px; cursor: pointer; font-size: 13px; }

        .nav-grid { display: none; gap: 12px; margin: 0 auto; width: 100%; grid-template-columns: repeat(2, 1fr); }
        .nav-grid.active { display: grid; }
        @media (min-width: 480px) { .nav-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 900px) { .nav-grid { grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr)); max-width: calc((var(--card-w) + 12px) * 6); } }

        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius); transition: 0.3s; position: relative; cursor: pointer; aspect-ratio: 16 / 11; display: flex; align-items: center; justify-content: center; width: 100%; }
        .card:hover { background: var(--glass-hover); transform: translateY(-3px); border-color: rgba(255,255,255,0.25); }
        .card.sortable-ghost { opacity: 0.4; background: var(--primary); } 
        .card.hidden-item { opacity: 0.3; filter: grayscale(1); } 
        .card a { text-decoration: none; color: inherit; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; overflow: hidden; }
        
        .icon-wrapper { height: 35%; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .card img { width: 32px; height: 32px; border-radius: 6px; object-fit: contain; }
        .card .emoji-icon { font-size: 24px; }
        .card h3 { font-size: 14px; font-weight: 600; text-align: center; width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #fff; }
        
        .admin-actions { position: absolute; top: 5px; right: 5px; display: flex; gap: 3px; z-index: 20; opacity: 1; } 
        .action-mini { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); width: 22px; height: 22px; border-radius: 5px; color: #fff; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        
        .fab { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .fab-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--glass); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); backdrop-filter: blur(10px); transition: 0.3s; font-size: 12px; font-weight: bold; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .fab-btn:hover { background: var(--primary); transform: scale(1.1); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; width: 90%; max-width: 450px; padding: 25px; border-radius: 20px; border: 1px solid #333; position: relative; }
        .form-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .form-row label { width: 85px; text-align: left; font-size: 13px; color: #ccc; flex-shrink: 0; font-weight: bold; }
        input, select { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; outline: none; font-size: 14px; width: 100%; }
        
        .preview-container { width: 40px; height: 40px; background: #282828; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; border-radius: 8px; margin-left: 8px; }
        .preview-container img { width: 24px; height: 24px; object-fit: contain; }
        
        /* Toast 提示防堆叠，移至底部居中，平滑滑动 */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(50px); background: #27ae60; color: white; padding: 12px 30px; border-radius: 30px; border: 1px solid var(--glass-border); z-index: 3000; text-align: center; font-weight: bold; font-size: 14px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); opacity: 0; visibility: hidden; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55); pointer-events: none; }
        #toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        /* 骨架屏 Skeleton Screen 动画与样式 */
        #skeleton-screen { display: none; width: 100%; margin-top: 40px; }
        .skel-tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 35px; flex-wrap: wrap; }
        .skel-tab { width: 80px; height: 35px; border-radius: 40px; background: rgba(255,255,255,0.05); }
        .skel-grid { display: grid; gap: 12px; margin: 0 auto; width: 100%; max-width: 1200px; grid-template-columns: repeat(2, 1fr); }
        @media (min-width: 480px) { .skel-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 900px) { .skel-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
        .skel-card { aspect-ratio: 16/11; border-radius: var(--radius); background: rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .skel-anim::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 100% { left: 150%; } }

        .footer-info { position: fixed; bottom: 10px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.4); font-size: 11px; pointer-events: none; }
        .cat-item-row.sortable-ghost { background: var(--primary) !important; opacity: 0.5; }
        .drag-handle { cursor: grab; color: #666; margin-right: 5px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="toast">操作成功</div>
    
    <div class="container">
        <div id="skeleton-screen">
            <div class="skel-tabs"><div class="skel-tab skel-anim"></div><div class="skel-tab skel-anim"></div><div class="skel-tab skel-anim"></div></div>
            <div class="skel-grid"><div class="skel-card skel-anim"></div><div class="skel-card skel-anim"></div><div class="skel-card skel-anim"></div><div class="skel-card skel-anim"></div><div class="skel-card skel-anim"></div><div class="skel-card skel-anim"></div></div>
        </div>

        <div id="main-content" style="display: none;">
            <div class="tab-container"><div id="tabs" class="tabs"></div><div id="cat-manage-area"></div></div>
            <div id="grid-container"></div>
        </div>
    </div>
    
    <div id="footer-cache" class="footer-info"></div>
    <div class="fab"><div id="admin-tools" style="display:contents"></div></div>
    <input type="file" id="import-file" accept=".json" style="display:none">

    <div id="auth-overlay" class="modal">
        <div class="modal-content" style="text-align:center">
            <button id="btn-close-auth" style="position:absolute; top:15px; right:15px; background:none; border:none; color:#777; cursor:pointer; font-size:24px">×</button>
            <h3>管理验证</h3>
            <input type="password" id="auth-input" placeholder="请输入Token" style="text-align:center; margin: 20px 0">
            <button id="btn-login" class="tab-btn active" style="width:100%">进入后台</button>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <button id="btn-close-edit" style="position:absolute; top:15px; right:15px; background:none; border:none; color:#777; cursor:pointer; font-size:24px">×</button>
            <h4 id="edit-title" style="margin-bottom:20px; font-size:16px">编辑详情</h4>
            <div id="edit-form-body"></div>
            <button id="btn-confirm-edit" class="tab-btn active" style="width:100%; margin-top:10px">确认保存修改</button>
        </div>
    </div>

    <script>
        // 注册 PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW Registration failed:', err));
            });
        }

        // 随机 Emoji 回退库挂载到全局，供 onerror 调用
        const FALLBACK_EMOJIS = ['🌍', '🌟', '🚀', '💡', '🔥', '✨', '🎈', '🎉', '🍀', '💎', '🧭', '🛸', '🔮', '🧩', '🎨'];
        window.getRandomEmoji = () => FALLBACK_EMOJIS[Math.floor(Math.random() * FALLBACK_EMOJIS.length)];

        document.addEventListener('DOMContentLoaded', () => {
            let appData = { settings: { cardWidth: 160 }, categories: [], items: [] };
            let activeCatId = '';
            let sysToken = localStorage.getItem('nav_token') || '';
            let isAdmin = false;
            let editingType = 'items'; 
            let editingId = null;
            let toastTimer = null;

            // 单例防重叠 Toast 提示
            const showToast = (msg = "操作成功", color = "#27ae60") => {
                const toast = document.getElementById('toast');
                toast.innerText = msg;
                toast.style.background = color;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
            };

            const toggleSkeleton = (show) => {
                document.getElementById('skeleton-screen').style.display = show ? 'block' : 'none';
                document.getElementById('main-content').style.display = show ? 'none' : 'block';
            };

            const debounce = (func, wait) => {
                let timeout;
                return function(...args) { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); };
            };

            const escapeHTML = (str) => {
                if (!str && str !== 0) return '';
                return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
            };

            // 背景图异步平滑加载
            const loadBackground = (url) => {
                if(!url) return;
                const img = new Image();
                img.src = url;
                img.onload = () => { document.body.style.backgroundImage = `url('${url}')`; };
            };

            // ================= 初始化与请求核心 =================
            const init = async (forceRender = false) => {
                let fetchUrl = '/api/config';
                const gridContainer = document.getElementById('grid-container');
                
                // 本地缓存优先渲染 (Stale-while-revalidate)
                const localCache = localStorage.getItem('nav_app_data');
                let initialIsAdmin = isAdmin; // 记录请求前的鉴权状态
                
                if (localCache) {
                    try {
                        appData = JSON.parse(localCache);
                        isAdmin = appData.isAdmin || false;
                        initialIsAdmin = isAdmin;
                        if (appData.settings) document.documentElement.style.setProperty('--card-w', appData.settings.cardWidth + 'px');
                        toggleSkeleton(false);
                        renderTools();
                        renderNav();
                        if (appData.bgUrl) loadBackground(appData.bgUrl);
                        if(appData.lastUpdated) document.getElementById('footer-cache').innerText = '最后同步：' + escapeHTML(appData.lastUpdated);
                    } catch (e) { toggleSkeleton(true); }
                } else {
                    toggleSkeleton(true);
                }
                
                // 静默发起网络请求拉取最新数据
                try {
                    const res = await fetch(fetchUrl, { headers: sysToken ? { 'Authorization': sysToken } : {}, cache: 'no-store' });
                    
                    if (!res.ok) {
                        if (res.status === 401) { localStorage.removeItem('nav_token'); sysToken = ''; isAdmin = false; }
                        throw new Error(`HTTP Error ${res.status}`);
                    }
                    
                    const newData = await res.json();
                    
                    // 对比本地数据，如果发生变化则重新渲染以防闪烁
                    const isDataChanged = !localCache || 
                        JSON.stringify(appData.items) !== JSON.stringify(newData.items) || 
                        JSON.stringify(appData.categories) !== JSON.stringify(newData.categories);

                    appData = newData;
                    isAdmin = appData.isAdmin || false;
                    localStorage.setItem('nav_app_data', JSON.stringify(appData));
                    
                    const isAdminChanged = initialIsAdmin !== isAdmin;

                    if (appData.bgUrl) loadBackground(appData.bgUrl);
                    if(appData.settings) document.documentElement.style.setProperty('--card-w', appData.settings.cardWidth + 'px');
                    
                    if (forceRender || isDataChanged || isAdminChanged || !localCache) {
                        toggleSkeleton(false);
                        renderTools();
                        renderNav();
                    }
                    if(appData.lastUpdated) document.getElementById('footer-cache').innerText = '最后同步：' + escapeHTML(appData.lastUpdated);

                } catch(e) {
                    console.error("后台数据更新失败", e);
                    if (!localCache) {
                        gridContainer.innerHTML = `<div style="margin:50px auto; padding:20px; background:rgba(255,0,0,0.2); border:1px solid red; border-radius:10px; text-align:left;">
                            <h3 style="color:#ff6b6b; margin-bottom:10px;">⚠️ 数据加载失败</h3><p>${escapeHTML(e.message)}</p>
                        </div>`;
                        toggleSkeleton(false);
                    }
                }
            };

            const renderTools = () => {
                const adminToolsContainer = document.getElementById('admin-tools');
                const catManageArea = document.getElementById('cat-manage-area');
                adminToolsContainer.innerHTML = '';
                
                const createFab = (text, bg, action) => {
                    const btn = document.createElement('div'); btn.className = 'fab-btn'; btn.innerText = text;
                    if (bg) { btn.style.background = bg; btn.style.color = 'white'; btn.style.border = 'none'; }
                    btn.addEventListener('click', action); adminToolsContainer.appendChild(btn);
                };

                if (isAdmin) {
                    document.title = "管理后台";
                    catManageArea.innerHTML = `<button class="manage-cat-btn" id="btn-manage-cats"><i class="ri-settings-line"></i> 偏好设置</button>`;
                    document.getElementById('btn-manage-cats').addEventListener('click', manageCats);
                    
                    // 重新加回了 默认 按钮
                    createFab('登出', '#e74c3c', doLogout);
                    createFab('保存', 'var(--primary)', () => saveAll(false));
                    createFab('导入', null, () => document.getElementById('import-file').click());
                    createFab('导出', null, exportConfig);
                    createFab('默认', null, resetConfig);
                } else {
                    document.title = "个人导航";
                    catManageArea.innerHTML = '';
                    createFab('管理', null, () => { document.getElementById('auth-overlay').style.display = 'flex'; setTimeout(() => document.getElementById('auth-input').focus(), 100); });
                }
            };

            const renderNav = () => {
                const tabs = document.getElementById('tabs');
                const container = document.getElementById('grid-container');
                tabs.innerHTML = ''; container.innerHTML = '';
                
                const cats = isAdmin ? appData.categories : appData.categories.filter(c => !c.hidden);
                if (cats.length > 0 && !activeCatId) activeCatId = cats[0].id;
                if (!cats.find(c => c.id === activeCatId) && cats.length > 0) activeCatId = cats[0].id;

                cats.forEach((cat) => {
                    const btn = document.createElement('button');
                    btn.className = 'tab-btn' + (activeCatId === cat.id ? ' active' : '') + (cat.hidden ? ' hidden-item' : '');
                    btn.innerHTML = escapeHTML(cat.icon) + ' ' + escapeHTML(cat.name);
                    btn.addEventListener('click', () => { activeCatId = cat.id; renderNav(); });
                    tabs.appendChild(btn);

                    const grid = document.createElement('div');
                    grid.id = 'grid-' + cat.id;
                    grid.className = 'nav-grid' + (activeCatId === cat.id ? ' active' : '');
                    
                    grid.addEventListener('click', (e) => {
                        const actionBtn = e.target.closest('.action-mini');
                        if (actionBtn) {
                            e.preventDefault(); e.stopPropagation();
                            const action = actionBtn.getAttribute('data-action');
                            const targetId = actionBtn.getAttribute('data-id');
                            if (action === 'toggleHide') toggleHide('items', targetId);
                            if (action === 'edit') openItemEdit(targetId, null);
                            if (action === 'delete') deleteObj('items', targetId);
                            return;
                        }
                        if (e.target.closest('.card-add-new')) { e.preventDefault(); e.stopPropagation(); openItemEdit('', cat.id); }
                    });

                    // 使用 DocumentFragment 批量渲染 DOM
                    const fragment = document.createDocumentFragment();
                    const catItems = appData.items.filter(i => i.catId === cat.id && (isAdmin || !i.hidden));
                    
                    catItems.forEach((item) => {
                        const card = document.createElement('div');
                        card.className = 'card' + (item.hidden ? ' hidden-item' : '');
                        card.setAttribute('data-id', escapeHTML(item.id)); 
                        
                        // 智能容错，图片加载失败时使用全局 getRandomEmoji() 替换为 Emoji
                        let fallbackAttr = `onerror="this.outerHTML='<span class=\\'emoji-icon\\'>'+window.getRandomEmoji()+'</span>';"`;
                        
                        const safeIcon = escapeHTML(item.icon);
                        const iconHtml = (item.icon && item.icon.startsWith('http')) ? `<img src="${safeIcon}" loading="lazy" ${fallbackAttr}>` : `<span class="emoji-icon">${safeIcon || '🔗'}</span>`;
                        const safeUrl = escapeHTML(item.url); const safeTitle = escapeHTML(item.title);

                        let adminHtml = '';
                        if(isAdmin) {
                            adminHtml = `<div class="admin-actions">
                                <button class="action-mini" data-action="toggleHide" data-id="${escapeHTML(item.id)}"><i class="ri-eye-${item.hidden?'off-':''}line"></i></button>
                                <button class="action-mini" data-action="edit" data-id="${escapeHTML(item.id)}"><i class="ri-edit-line"></i></button>
                                <button class="action-mini" data-action="delete" data-id="${escapeHTML(item.id)}"><i class="ri-delete-bin-line"></i></button>
                            </div>`;
                        }

                        card.innerHTML = `${adminHtml}<a href="${safeUrl}" target="_blank"><div class="icon-wrapper">${iconHtml}</div><h3>${safeTitle}</h3></a>`;
                        fragment.appendChild(card);
                    });

                    if(isAdmin) {
                        const addCard = document.createElement('div');
                        addCard.className = 'card card-add-new'; addCard.style.borderStyle = 'dashed';
                        addCard.innerHTML = '<a href="javascript:void(0)"><div class="icon-wrapper"><div class="emoji-icon">➕</div></div><h3>新增</h3></a>';
                        fragment.appendChild(addCard);
                    }
                    
                    grid.appendChild(fragment); // 一次性插入
                    container.appendChild(grid);

                    if(isAdmin) {
                        new Sortable(grid, {
                            animation: 150, ghostClass: 'sortable-ghost', filter: '.dashed', 
                            onEnd: () => {
                                const newIdOrder = Array.from(grid.querySelectorAll('.card[data-id]')).map(el => el.getAttribute('data-id'));
                                const otherCatItems = appData.items.filter(i => i.catId !== cat.id); 
                                const sortedCurrentItems = newIdOrder.map(id => appData.items.find(i => i.id === id)); 
                                appData.items = [...otherCatItems, ...sortedCurrentItems]; 
                                saveAll(true); 
                            }
                        });
                    }
                });
            };

            const debouncedHandleUrlInput = debounce((val) => handleUrlInput(val), 500);

            const openItemEdit = (id, catId) => {
                editingType = 'items'; editingId = id; 
                const item = id ? appData.items.find(i => i.id === id) : { id: 'i'+Date.now(), title:'', url:'', icon:'', catId: catId };
                const safeUrl = escapeHTML(item.url); const safeTitle = escapeHTML(item.title); const safeIcon = escapeHTML(item.icon);
                
                document.getElementById('edit-form-body').innerHTML = `
                    <div class="form-row"><label>网站 URL</label><input id="f-url" value="${safeUrl}"></div>
                    <div class="form-row"><label>网站名称</label><input id="f-title" value="${safeTitle}"></div>
                    <div class="form-row"><label>图标设置</label>
                        <div style="display:flex; width:100%; align-items:center;">
                            <input id="f-icon" value="${safeIcon}" placeholder="可手动填入，或选择下方智能接口">
                            <div id="preview-box" class="preview-container"></div>
                        </div>
                    </div>
                    <div class="form-row"><label style="font-size:12px; font-weight:normal; color:#999;">Favicon.im</label>
                        <div style="display:flex; align-items:center; width:100%;">
                            <input type="radio" name="icon_sel" id="opt-fav1" style="width:18px; height:18px; flex-shrink:0; margin:0 10px 0 0; cursor:pointer;">
                            <input id="txt-fav1" readonly placeholder="等待填写 URL 自动解析..." style="flex:1; min-width:0; color:#aaa; font-size:13px; cursor:pointer; background:#1a1a1a;">
                            <div class="preview-container" style="background:#1a1a1a;"><img id="img-fav1" src="" loading="lazy"></div>
                        </div>
                    </div>
                    <div class="form-row"><label style="font-size:12px; font-weight:normal; color:#999;">DuckDuckGo</label>
                        <div style="display:flex; align-items:center; width:100%;">
                            <input type="radio" name="icon_sel" id="opt-fav2" style="width:18px; height:18px; flex-shrink:0; margin:0 10px 0 0; cursor:pointer;">
                            <input id="txt-fav2" readonly placeholder="等待填写 URL 自动解析..." style="flex:1; min-width:0; color:#aaa; font-size:13px; cursor:pointer; background:#1a1a1a;">
                            <div class="preview-container" style="background:#1a1a1a;"><img id="img-fav2" src="" loading="lazy"></div>
                        </div>
                    </div>
                    <div class="form-row"><label>归属分类</label><select id="f-cat">${appData.categories.map(c => `<option value="${escapeHTML(c.id)}" ${c.id===item.catId?'selected':''}>${escapeHTML(c.name)}</option>`).join('')}</select></div>
                `;

                document.getElementById('f-url').addEventListener('input', (e) => debouncedHandleUrlInput(e.target.value));
                document.getElementById('f-icon').addEventListener('input', (e) => updatePreview(e.target.value));
                
                ['1', '2'].forEach(num => {
                    const opt = document.getElementById('opt-fav'+num); const txt = document.getElementById('txt-fav'+num);
                    opt.addEventListener('change', () => selectIcon(txt.value));
                    txt.addEventListener('click', () => { if (txt.value) { opt.checked = true; selectIcon(txt.value); } });
                });

                updatePreview(item.icon); 
                if(item.url) handleUrlInput(item.url, false); 
                document.getElementById('edit-modal').style.display = 'flex'; 
            };

            const selectIcon = (url) => { if (!url) return; document.getElementById('f-icon').value = url; updatePreview(url); };

            const handleUrlInput = (url, autoSelect = true) => { 
                if(url && url.startsWith('http')) { 
                    try { 
                        const domain = new URL(url).hostname; 
                        const icon1 = "https://favicon.im/" + domain; const icon2 = "https://icons.duckduckgo.com/ip3/" + domain + ".ico"; 
                        document.getElementById('txt-fav1').value = icon1; document.getElementById('img-fav1').src = icon1;
                        document.getElementById('txt-fav2').value = icon2; document.getElementById('img-fav2').src = icon2;
                        const currentIconVal = document.getElementById('f-icon').value;
                        if(autoSelect && !currentIconVal) { document.getElementById('opt-fav1').checked = true; selectIcon(icon1); } 
                        else if (currentIconVal === icon1) { document.getElementById('opt-fav1').checked = true; } 
                        else if (currentIconVal === icon2) { document.getElementById('opt-fav2').checked = true; } 
                        else { document.getElementById('opt-fav1').checked = false; document.getElementById('opt-fav2').checked = false; }
                    } catch(e) {} 
                } else {
                    document.getElementById('txt-fav1').value = ""; document.getElementById('img-fav1').src = ""; document.getElementById('opt-fav1').checked = false;
                    document.getElementById('txt-fav2').value = ""; document.getElementById('img-fav2').src = ""; document.getElementById('opt-fav2').checked = false;
                }
            };
            
            const updatePreview = (val) => { 
                const box = document.getElementById('preview-box'); 
                if(!val) { box.innerHTML = '🔗'; return; } 
                const safeVal = escapeHTML(val);
                if(safeVal.startsWith('http')) {
                    let fallbackAttr = `onerror="this.outerHTML='<span class=\\'emoji-icon\\'>'+window.getRandomEmoji()+'</span>';"`;
                    box.innerHTML = `<img src="${safeVal}" loading="lazy" ${fallbackAttr}>`;
                } else { box.innerHTML = safeVal; }
            };

            const manageCats = () => {
                editingType = 'cats'; document.getElementById('edit-title').innerText = '偏好与分类设置';
                document.getElementById('edit-form-body').innerHTML = `
                    <div class="form-row" style="border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px;">
                        <label>网格宽度</label><input type="number" id="setting-width" value="${appData.settings.cardWidth}"><span style="color:#666; margin-left:10px;">px</span>
                    </div>
                    <div id="cat-list-sort" style="max-height: 300px; overflow-y: auto;">
                        ${appData.categories.map((c) => `
                            <div class="cat-item-row" data-id="${escapeHTML(c.id)}" style="display:flex; gap:8px; margin-bottom:10px; align-items:center; background:#222; padding:8px; border-radius:10px;">
                                <i class="ri-drag-move-fill drag-handle"></i>
                                <input class="cat-icon-input" data-id="${escapeHTML(c.id)}" value="${escapeHTML(c.icon)}" style="width:40px; text-align:center; padding:5px">
                                <input class="cat-name-input" data-id="${escapeHTML(c.id)}" value="${escapeHTML(c.name)}" style="flex:1; padding:5px">
                                <button class="action-mini btn-cat-hide" data-id="${escapeHTML(c.id)}"><i class="ri-eye-${c.hidden?'off-':''}line"></i></button>
                                <button class="action-mini btn-cat-del" data-id="${escapeHTML(c.id)}"><i class="ri-delete-bin-line"></i></button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="tab-btn active" id="btn-add-cat" style="width:100%; margin-top:15px">+ 新增分类</button>
                `;

                document.getElementById('setting-width').addEventListener('input', (e) => changeCardWidth(e.target.value));
                document.getElementById('btn-add-cat').addEventListener('click', addCat);
                const catListSort = document.getElementById('cat-list-sort');
                catListSort.addEventListener('change', (e) => {
                    if(e.target.classList.contains('cat-icon-input')) updateCatData(e.target.getAttribute('data-id'), 'icon', e.target.value);
                    else if(e.target.classList.contains('cat-name-input')) updateCatData(e.target.getAttribute('data-id'), 'name', e.target.value);
                });
                catListSort.addEventListener('click', (e) => {
                    const hideBtn = e.target.closest('.btn-cat-hide'); if (hideBtn) { e.preventDefault(); toggleHide('categories', hideBtn.getAttribute('data-id')); }
                    const delBtn = e.target.closest('.btn-cat-del'); if (delBtn) { e.preventDefault(); deleteObj('categories', delBtn.getAttribute('data-id')); }
                });
                new Sortable(catListSort, { animation: 150, handle: '.drag-handle', ghostClass: 'sortable-ghost', onEnd: () => { 
                    const newIdOrder = Array.from(catListSort.querySelectorAll('.cat-item-row')).map(el => el.getAttribute('data-id')); 
                    appData.categories = newIdOrder.map(id => appData.categories.find(c => c.id === id)); renderNav(); saveAll(true); 
                } });
                document.getElementById('edit-modal').style.display = 'flex';
            };

            const changeCardWidth = (val) => { appData.settings.cardWidth = parseInt(val) || 160; document.documentElement.style.setProperty('--card-w', appData.settings.cardWidth + 'px'); };
            const updateCatData = (id, field, val) => { const cat = appData.categories.find(c => c.id === id); if(cat) cat[field] = val; renderNav(); };
            const addCat = () => { appData.categories.push({ id: 'c'+Date.now(), name: '新分类', icon: '📁', hidden: false }); manageCats(); renderNav(); };
            const confirmEdit = () => {
                if(editingType === 'items') {
                    const url = document.getElementById('f-url').value; const title = document.getElementById('f-title').value; const icon = document.getElementById('f-icon').value; const catId = document.getElementById('f-cat').value;
                    if(editingId) { const idx = appData.items.findIndex(i => i.id === editingId); if(idx > -1) appData.items[idx] = { ...appData.items[idx], url, title, icon, catId }; } 
                    else { appData.items.push({ id: 'i'+Date.now(), url, title, icon, catId, hidden: false }); }
                }
                renderNav(); closeModal(); saveAll(false); 
            };
            const toggleHide = (type, id) => { const item = appData[type].find(o => o.id === id); if(item) item.hidden = !item.hidden; saveAll(false); renderNav(); if(type === 'categories') manageCats(); };
            const deleteObj = (type, id) => { if(confirm('确定删除？')) { const idx = appData[type].findIndex(o => o.id === id); if(idx > -1) appData[type].splice(idx, 1); renderNav(); if(type === 'categories') manageCats(); saveAll(false); } };
            
            // ================= 接口请求 =================
            const doLogin = async () => { 
                sysToken = document.getElementById('auth-input').value; 
                localStorage.setItem('nav_token', sysToken); 
                document.getElementById('auth-overlay').style.display = 'none'; 
                await init(true); 
                if(!isAdmin) {
                    showToast("验证失败，Token 不正确", "#e74c3c");
                    localStorage.removeItem('nav_token');
                    sysToken = '';
                    document.getElementById('auth-input').value = '';
                } else {
                    showToast("已进入管理模式");
                }
            };

            const doLogout = () => { 
                localStorage.removeItem('nav_token'); 
                sysToken = ''; 
                isAdmin = false; 
                appData.isAdmin = false;
                localStorage.setItem('nav_app_data', JSON.stringify(appData));
                showToast("已退出管理模式", "#3498db");
                init(true); 
            };
            
            const saveAll = async (silent = false) => {
                const dataToSave = { ...appData }; delete dataToSave.isAdmin; delete dataToSave.bgUrl;
                localStorage.setItem('nav_app_data', JSON.stringify(appData)); 
                try {
                    const res = await fetch('/api/config', { method: 'POST', headers: { 'Authorization': sysToken, 'Content-Type': 'application/json' }, body: JSON.stringify(dataToSave) });
                    if(res.ok && !silent) showToast("保存成功！"); 
                    else if (!res.ok && !silent) showToast("保存失败，权限不足", "#e74c3c");
                } catch (error) { if(!silent) showToast("网络错误，配置仅保存在本地", "#e67e22"); }
            };

            const importConfig = (event) => {
                const file = event.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try { const importedData = JSON.parse(e.target.result); if (importedData.categories && importedData.items) { if(confirm('警告：覆盖当前配置？')) { appData = importedData; appData.isAdmin = isAdmin; saveAll(false); renderNav(); } } else { alert("无效配置！"); } } catch(err) { alert("解析失败！"); }
                    event.target.value = '';
                }; reader.readAsText(file);
            };

            // 【恢复：配置重置逻辑】调用后端 DELETE 接口并重载页面
            const resetConfig = async () => { 
                if(confirm('⚠️ 警告：这将会清除所有的自定义修改！\n\n确定重置为初始默认配置吗？')) {
                    try {
                        const res = await fetch('/api/config', { method: 'DELETE', headers: { 'Authorization': sysToken } });
                        if(res.ok) { 
                            localStorage.removeItem('nav_app_data'); 
                            alert('重置成功！即将刷新页面'); 
                            location.reload(); 
                        } else { 
                            alert('重置失败。'); 
                        }
                    } catch(e) {
                        alert('网络错误，重置失败');
                    }
                }
            };
            
            const exportConfig = () => { const dataToExport = { ...appData }; delete dataToExport.isAdmin; delete dataToExport.bgUrl; const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'nav-config.json'; a.click(); };
            const closeModal = () => { document.getElementById('edit-modal').style.display = 'none'; };

            document.getElementById('auth-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
            document.getElementById('btn-login').addEventListener('click', doLogin);
            document.getElementById('btn-close-auth').addEventListener('click', () => { document.getElementById('auth-overlay').style.display = 'none'; });
            document.getElementById('btn-close-edit').addEventListener('click', closeModal);
            document.getElementById('btn-confirm-edit').addEventListener('click', confirmEdit);
            document.getElementById('import-file').addEventListener('change', importConfig);

            init();
        });
    </script>
</body>
</html>
